<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparar | AniLiber</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/aniliber-icon-32.png?v=aniliber-icon-v1" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/aniliber-icon-192.png?v=aniliber-icon-v1" />
    <link rel="apple-touch-icon" href="assets/aniliber-icon-512.png?v=aniliber-icon-v1" />
    <link rel="stylesheet" href="css/style.css?v=platform-v11" />
    <script type="module" src="./js/theme.js?v=platform-v11"></script>
    <script type="module" src="./js/utils.js?v=platform-v11"></script>
  </head>
  <body class="compare-page">
    <nav class="nav"></nav>

    <main class="page compare-dashboard-page">
      <section class="compare-hero">
        <div class="compare-hero-copy">
          <h1>Comparar</h1>
          <p>Compare gosto, gêneros e notas entre dois membros.</p>
        </div>
      </section>

      <section class="compare-selector-bar">
        <label class="compare-inline-label" for="person1">Comparar</label>
        <select id="person1" aria-label="Primeiro membro"></select>
        <label class="compare-inline-label" for="person2">com</label>
        <select id="person2" aria-label="Segundo membro"></select>
      </section>

      <section class="compare-top-grid">
        <article class="card compare-surface-card compare-venn4-card">
          <div class="card-title compare-card-title">Mapa de afinidade</div>
          <div id="venn4-container"></div>
        </article>

        <aside class="card compare-surface-card compare-summary-shell">
          <div class="card-title compare-card-title">Resumo da comparação</div>
          <div id="compare-summary"></div>
        </aside>
      </section>

      <section class="compare-bottom-grid">
        <article class="card compare-surface-card">
          <div class="card-title compare-card-title">Venn dos gêneros</div>
          <div id="venn-container"></div>
        </article>

        <article class="card compare-surface-card">
          <div class="card-title compare-card-title">Perfil de gêneros — radar</div>
          <div class="chart-container compare-radar-wrap">
            <canvas id="chartRadar"></canvas>
          </div>
        </article>
      </section>

      <section class="card compare-surface-card compare-table-card">
        <div class="card-title compare-card-title">Animes em comum — notas comparadas</div>
        <p class="compare-table-caption">Linhas em destaque mostram diferença de 2 pontos ou mais.</p>
        <div id="common-table-wrap"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script type="module">
      import { loadData } from "./js/data.js?v=platform-v11";
      import { initCompare } from "./js/compare.js?v=platform-v11";

      async function init() {
        const { animes, members } = await loadData();
        initCompare(animes, members);
      }

      init().catch(() => {});
    </script>
    <script type="module" src="js/nyx-widget.js?v=platform-v11"></script>
  </body>
</html>
