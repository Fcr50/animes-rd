<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil | Animes RD</title>
  <link rel="stylesheet" href="css/style.css?v=platform-v8" />
  <script type="module" src="./js/theme.js?v=platform-v8"></script>
  <script type="module" src="./js/utils.js?v=platform-v8"></script>
</head>
<body class="profile-page">
  <nav class="nav"></nav>

  <main class="page">
    <!-- Cabeçalho simplificado sem a barra gigante -->
    <header id="profile-header" class="profile-header-new">
       <!-- Preenchido via JS: apenas Nome e Role -->
    </header>

    <!-- Grid de Destaques (Os 2 cards que faltavam + Gênero Fav) -->
    <div class="stats-grid-highlights" id="profile-highlights">
       <!-- Preenchido via JS: Melhor Nota, Mais Controverso, Gênero Fav -->
    </div>

    <!-- Grid principal -->
    <div class="grid-2">
      <!-- Coluna Esquerda: Top 10 -->
      <section class="card profile-top10-card">
        <div class="card-title">🏆 Top 10 Animes</div>
        <div id="top-animes" class="profile-ranking-list">
          <!-- Preenchido via JS -->
        </div>
      </section>

      <!-- Coluna Direita: Estatísticas e Gêneros -->
      <div style="display: flex; flex-direction: column; gap: 20px;">
        <section class="card">
          <div class="card-title">📊 Resumo Geral</div>
          <div class="stats-grid" id="profile-stats" style="grid-template-columns: 1fr 1fr; margin-top: 10px;">
            <!-- Preenchido via JS -->
          </div>
        </section>

        <section class="card">
          <div class="card-title">🎭 Distribuição de Gêneros</div>
          <div id="genre-chart" class="profile-genre-chart" style="margin-top: 15px;">
            <!-- Preenchido via JS -->
          </div>
        </section>
      </div>
    </div>

    <!-- Tabela de Exclusivos -->
    <section class="card" style="margin-top: 28px;">
      <div class="card-title">🌟 Animes Exclusivos</div>
      <p style="color: var(--faint); font-size: 13px; margin-bottom: 20px;">Títulos que apenas esta pessoa assistiu neste grupo.</p>
      <div id="exclusive-list" class="profile-exclusives-grid">
        <!-- Preenchido via JS -->
      </div>
    </section>
  </main>

  <script type="module" src="./js/profile.js?v=platform-v8"></script>
  <script type="module" src="js/nyx-widget.js?v=platform-v8"></script>
</body>
</html>
