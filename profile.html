<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil | AniLiber</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/aniliber-icon-32.png?v=aniliber-icon-v4" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/aniliber-icon-192.png?v=aniliber-icon-v4" />
  <link rel="apple-touch-icon" href="assets/aniliber-icon-512.png?v=aniliber-icon-v4" />
  <link rel="stylesheet" href="css/style.css?v=platform-v16" />
  <script type="module" src="./js/theme.js?v=platform-v15"></script>
  <script type="module" src="./js/utils.js?v=platform-v16"></script>
</head>
<body class="profile-page">
  <nav class="nav"></nav>

  <main class="page profile-dashboard-page">
    <header id="profile-header" class="profile-hero-card">
      <!-- Preenchido via JS -->
    </header>

    <div class="stats-grid-highlights profile-highlight-grid" id="profile-highlights">
      <!-- Preenchido via JS -->
    </div>

    <section class="card profile-surface-card profile-favorites-section hidden" id="global-favorites">
      <div class="profile-section-head">
        <div class="card-title profile-card-title">Favoritos Globais</div>
      </div>
      <div class="profile-favorites-main">
        <div class="profile-fav-animes" id="fav-animes-posters">
          <!-- Top 3 posters -->
        </div>
        <div class="profile-fav-openings">
          <span class="profile-visual-kicker">Top Openings</span>
          <div id="fav-openings-list" class="profile-openings-links">
            <!-- Openings links -->
          </div>
        </div>
      </div>
    </section>

    <div class="profile-main-grid">
      <section class="card profile-top10-card profile-surface-card">
        <div class="profile-section-head">
          <div class="card-title profile-card-title">Top 10 animes</div>
        </div>
        <div id="top-animes" class="profile-ranking-list">
          <!-- Preenchido via JS -->
        </div>
      </section>

      <div class="profile-side-column">
        <section class="card profile-surface-card">
          <div class="card-title profile-card-title">Resumo geral</div>
          <div class="profile-summary-grid" id="profile-stats">
            <!-- Preenchido via JS -->
          </div>
        </section>

        <section class="card profile-surface-card">
          <div class="card-title profile-card-title">Atividade recente</div>
          <div id="profile-activity" class="profile-activity-list">
            <!-- Preenchido via JS -->
          </div>
        </section>

        <section class="card profile-surface-card profile-genre-side-card">
          <div class="card-title profile-card-title">Distribuicao de generos</div>
          <div id="genre-chart" class="profile-genre-chart">
            <!-- Preenchido via JS -->
          </div>
        </section>
      </div>
    </div>

    <section class="card profile-surface-card profile-exclusives-section">
      <div class="card-title profile-card-title">Animes exclusivos</div>
      <p class="profile-section-caption">Titulos que apenas esta pessoa assistiu neste grupo.</p>
      <div id="exclusive-list" class="profile-exclusives-grid">
        <!-- Preenchido via JS -->
      </div>
    </section>
  </main>

  <script type="module" src="./js/profile.js?v=platform-v15"></script>
  <script type="module" src="js/nyx-widget.js?v=platform-v15"></script>
</body>
</html>
