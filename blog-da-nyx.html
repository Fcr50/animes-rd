<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog da Nyx | AniLiber</title>
    <link rel="stylesheet" href="css/style.css?v=artslum-1" />
    <script type="module" src="./js/theme.js?v=cleanup-1"></script>
    <script type="module" src="./js/utils.js?v=cleanup-1"></script>
  </head>
  <body class="nyx-page">
    <nav class="nav"></nav>

    <main class="nyx-shell">
      <aside class="nyx-left-art" aria-label="Nyx">
        <img src="assets/nyx-full.webp" alt="Nyx" width="620" height="930" decoding="async" />
      </aside>

      <aside class="nyx-chat-panel" aria-label="Chat da Nyx">
        <h3>Chat da Nyx</h3>
        <div class="nyx-chat-log" id="nyx-chat-log">
          <div class="nyx-chat-row">
            <img
              class="nyx-chat-avatar"
              src="assets/nyx-hero.webp?v=desafios-soft-1"
              alt="Nyx"
              width="38"
              height="38"
              decoding="async"
            />
            <div class="nyx-chat-bubble">Clica no botão que eu te recomendo um anime.</div>
          </div>
        </div>
        <button class="nyx-chat-btn" type="button" id="nyx-recommend-btn">
          Me recomende um anime
        </button>
      </aside>

      <section class="nyx-hero">
        <img
          class="nyx-hero-image"
          src="assets/nyx-hero.webp?v=desafios-soft-1"
          alt="Nyx"
          width="420"
          height="449"
          decoding="async"
        />
        <div>
          <span class="eyebrow">Blog da Nyx</span>
          <h1>Nyx recomenda seu próximo anime.</h1>
          <p id="nyx-summary">Carregando dicas do acervo...</p>
        </div>
      </section>

      <section class="nyx-panel">
        <div class="nyx-panel-head">
          <span class="eyebrow">IA da Nyx</span>
          <h2>Dicas para quem ainda não assistiu</h2>
        </div>
        <div class="nyx-person-tabs" id="nyx-people" aria-label="Escolher membro"></div>
        <div class="nyx-results" id="nyx-results">
          <div class="skeleton" style="height: 260px"></div>
        </div>
      </section>
    </main>

    <script type="module" src="js/nyx.js?v=desafios-soft-1"></script>
    <script type="module" src="js/nyx-widget.js?v=desafios-soft-1"></script>
  </body>
</html>
