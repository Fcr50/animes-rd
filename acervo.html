<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acervo — AniLiber</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/aniliber-icon-32.png?v=aniliber-icon-v4"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/aniliber-icon-192.png?v=aniliber-icon-v4"
    />
    <link rel="apple-touch-icon" href="assets/aniliber-icon-512.png?v=aniliber-icon-v4" />
    <link rel="stylesheet" href="css/style.css?v=platform-v16" />
    <script type="module" src="./js/theme.js?v=platform-v5"></script>
    <script type="module" src="./js/utils.js?v=platform-v16"></script>
    <style>
      @media (max-width: 768px) {
        /* Stat cards menores */
        .stat-value {
          font-size: 28px;
        }

        /* Tabela → grade de cards 2 colunas */
        .acervo-main-card .table-wrap {
          border: none;
          border-radius: 0;
          overflow: visible;
        }

        .acervo-main-card table {
          display: block;
        }

        .acervo-main-card thead {
          display: none;
        }

        .acervo-main-card tbody {
          display: grid;
          gap: 10px;
          grid-template-columns: 1fr 1fr;
        }

        .acervo-main-card tbody tr {
          background: rgba(243, 239, 230, 0.04);
          border: 1px solid rgba(243, 239, 230, 0.1);
          border-radius: 10px;
          cursor: pointer;
          display: flex;
          flex-direction: column;
          overflow: hidden;
          transition:
            background 0.15s ease,
            border-color 0.15s ease;
        }

        /* Override: último tr não perde a borda inferior */
        .acervo-main-card tbody tr:last-child {
          border-bottom: 1px solid rgba(243, 239, 230, 0.1);
        }

        .acervo-main-card tbody tr:hover {
          background: rgba(243, 239, 230, 0.07);
          border-color: rgba(243, 239, 230, 0.2);
        }

        /* Estado vazio/carregando: span full width */
        .acervo-main-card tbody tr:has(td[colspan]) {
          background: none;
          border: none;
          grid-column: 1 / -1;
        }

        /* Ocultar gêneros, votos e controvérsia */
        .acervo-main-card tbody td:nth-child(2),
        .acervo-main-card tbody td:nth-child(5),
        .acervo-main-card tbody td:nth-child(6) {
          display: none;
        }

        /* Célula do anime: imagem cover + nome */
        .acervo-main-card tbody td:nth-child(1) {
          padding: 0;
        }

        .acervo-main-card tbody .anime-identity {
          align-items: flex-start;
          display: flex;
          flex-direction: column;
          gap: 0;
          min-width: 0;
          width: 100%;
        }

        .acervo-main-card tbody .anime-img {
          border-radius: 0;
          flex: none;
          height: 105px;
          object-fit: cover;
          width: 100%;
        }

        .acervo-main-card tbody .anime-name {
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 2;
          display: -webkit-box;
          font-size: 11px;
          line-height: 1.35;
          overflow: hidden;
          padding: 7px 8px 3px;
        }

        .acervo-main-card tbody .dub-badge {
          font-size: 9px;
          margin: 0 8px 4px;
        }

        /* Quem assistiu: badges compactos */
        .acervo-main-card tbody td:nth-child(3) {
          display: flex;
          flex-wrap: wrap;
          gap: 3px;
          padding: 2px 8px 6px;
        }

        .acervo-main-card tbody td:nth-child(3) .badge {
          font-size: 9px;
          padding: 2px 5px;
        }

        /* Nota: empurrada para o rodapé do card */
        .acervo-main-card tbody td:nth-child(4) {
          border-top: 1px solid rgba(243, 239, 230, 0.08);
          margin-top: auto;
          padding: 7px 8px;
          text-align: left !important;
        }
      }

      @media (max-width: 480px) {
        .acervo-main-card tbody {
          gap: 8px;
        }

        .acervo-main-card tbody .anime-img {
          height: 90px;
        }
      }
    </style>
  </head>
  <body class="acervo-page">
    <nav class="nav"></nav>

    <main class="page">
      <div class="page-header">
        <h1><span class="archive-title-gradient">Acervo</span></h1>
        <p id="updated-at">Carregando dados...</p>
      </div>

      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="skeleton" style="width: 60%; margin-bottom: 8px"></div>
          <div class="skeleton" style="width: 40%; height: 30px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="width: 60%; margin-bottom: 8px"></div>
          <div class="skeleton" style="width: 40%; height: 30px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="width: 60%; margin-bottom: 8px"></div>
          <div class="skeleton" style="width: 40%; height: 30px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="width: 60%; margin-bottom: 8px"></div>
          <div class="skeleton" style="width: 40%; height: 30px"></div>
        </div>
      </div>

      <div class="card acervo-main-card" style="margin-bottom: 28px">
        <div id="filters" class="filters"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-col="nome">Anime</th>
                <th data-col="generos">Gêneros</th>
                <th data-col="quemAssistiu">Quem assistiu</th>
                <th data-col="nota" style="text-align: center">Nota</th>
                <th data-col="qtdVotos" style="text-align: center">Votos</th>
                <th data-col="controversia" style="text-align: center">Controvérsia</th>
              </tr>
            </thead>
            <tbody id="anime-tbody">
              <tr>
                <td colspan="6" style="text-align: center; padding: 32px; color: var(--faint)">
                  Carregando...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script type="module">
      import { loadData, formatNota } from "./js/data.js?v=platform-v18";
      import { initTable } from "./js/table.js?v=platform-v18";

      async function init() {
        const { animes, updatedAt, total } = await loadData();

        const d = new Date(updatedAt);
        document.getElementById("updated-at").textContent =
          `${total} animes — atualizado em ${d.toLocaleDateString("pt-BR")} às ${d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}`;

        const withNota = animes.filter((a) => a.nota !== null);
        const avgAll = withNota.length
          ? withNota.reduce((s, a) => s + Number(a.nota), 0) / withNota.length
          : null;

        const mostContr = [...animes]
          .filter((a) => a.controversia !== null && a.controversia > 0)
          .sort((a, b) => b.controversia - a.controversia)[0];

        const topRated = [...animes]
          .filter((a) => a.nota !== null)
          .sort((a, b) => Number(b.nota) - Number(a.nota))[0];

        document.getElementById("stats-grid").innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Total de animes</div>
            <div class="stat-value" style="color:#a78bfa">${total}</div>
            <div class="stat-sub">na base de dados</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Média geral</div>
            <div class="stat-value" style="color:#ff9dcc">${avgAll ? avgAll.toFixed(2) : "—"}</div>
            <div class="stat-sub">de 10</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Mais controverso</div>
            <div class="stat-value" style="color:#86efac">${mostContr ? Number(mostContr.controversia).toFixed(1) : "—"}</div>
            <div class="stat-sub" title="${mostContr?.name ?? ""}">${mostContr?.name?.slice(0, 22) ?? "—"}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Melhor nota</div>
            <div class="stat-value" style="color:#67e8f9">${topRated ? Number(topRated.nota).toFixed(2) : "—"}</div>
            <div class="stat-sub" title="${topRated?.name ?? ""}">${topRated?.name?.slice(0, 22) ?? "—"}</div>
          </div>
        `;

        await initTable();
      }

      init().catch(console.error);
    </script>
    <script type="module" src="js/nyx-widget.js?v=platform-v5"></script>
  </body>
</html>
