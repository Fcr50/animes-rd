<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico de Votos | AniLiber</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/aniliber-icon-32.png?v=aniliber-icon-v4" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/aniliber-icon-192.png?v=aniliber-icon-v4" />
    <link rel="apple-touch-icon" href="assets/aniliber-icon-512.png?v=aniliber-icon-v4" />
    <link rel="stylesheet" href="css/style.css?v=platform-v16" />
    <style>
      .pending-header {
        display: flex; align-items: center;
        justify-content: space-between; gap: 20px;
        flex-wrap: wrap; margin-bottom: 32px;
      }
      .pending-header-text h1 {
        font-size: 62px; font-weight: 800;
        background: linear-gradient(90deg, #2a9db4, #86efac);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; margin: 0 0 4px; line-height: 1;
      }
      .pending-header-text p { color: var(--faint); margin: 0; font-size: 14px; }
      .pending-history-btn, a.pending-history-btn {
        padding: 9px 20px; border-radius: 999px;
        border: 1px solid rgba(74,222,128,0.55) !important;
        background: rgba(74,222,128,0.1) !important;
        color: #4ade80 !important; font-size: 13px; font-weight: 800;
        text-decoration: none !important; white-space: nowrap; display: inline-block;
        transition: background 0.18s, border-color 0.18s;
      }
      .pending-history-btn:hover, a.pending-history-btn:hover {
        background: rgba(74,222,128,0.2) !important;
        border-color: rgba(74,222,128,0.85) !important;
        color: #fff !important;
      }
      @media (max-width: 768px) {
        .pending-header { flex-direction: column; align-items: flex-start; }
        .pending-header-text h1 { font-size: 40px; }
      }

      #historico-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 24px;
        margin-top: 20px;
        align-items: stretch;
      }
      .list-header, .empty-state { grid-column: 1 / -1; }
      .empty-state { text-align:center; padding:100px 20px; }
      
      .history-card {
        background: #12141a;
        border: 1px solid rgba(134,239,172,0.08);
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        display: flex;
      }
      .history-card-bg {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        background-size: cover; background-position: center;
        z-index: 0; opacity: 0.30;
      }
      .history-card-content {
        position: relative; z-index: 1;
        padding: 24px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100%;
        width: 100%;
      }
      
      .card-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px; }
      .card-header h3 { margin:0; font-family:'Newsreader',serif; font-size:20px; color:#fff; line-height:1.3; padding-right:10px; }
      .dots-container { display:flex; flex-shrink:0; }
      .member-dot { display:inline-flex;width:20px;height:20px;border-radius:50%;align-items:center;justify-content:center;font-size:9px;font-weight:bold;margin-left:4px;border:1.5px solid; }

      .card-genres { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:28px; }
      .card-submitter { font-size:12px;color:var(--muted);margin:0 0 16px 0; }
      
      .card-section-middle {
        display: flex;
        flex-direction: column;
        margin-top: auto;
      }

      .card-links { position:relative; margin-bottom:20px; }
      .links-label { font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.3);margin-bottom:8px;font-weight:700; }
      .links-list { display:flex;flex-wrap:wrap;gap:8px; }
      .btn-add-link { background:none;border:1px dashed var(--accent) !important;color:var(--accent) !important; }

      .card-my-vote { background:rgba(134,239,172,0.03);border:1px solid rgba(134,239,172,0.1);border-radius:16px;padding:16px;position:relative; }      .my-vote-header { display: flex; justify-content: space-between; align-items: center; font-weight:800;color:#86efac;font-size:15px;margin-bottom:8px; }
      
      .card-footer { align-self: end; padding-top: 16px; } 
      .other-vote-chip { font-size:11px;background:rgba(255,255,255,0.04);padding:4px 10px;border-radius:12px;color:var(--faint); }
      
      .add-link-panel, .edit-vote-panel { display: none; }
      .add-link-panel.open { display: block; margin-top: 12px; }
      .edit-vote-panel.open {
        display: block; margin-top: 15px;
        padding-top: 15px; border-top: 1px solid rgba(134,239,172,0.1);
      }
      .edit-vote-btn {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px; color: #fff;
        cursor: pointer; font-size: 11px;
        font-weight: 700; padding: 6px 12px;
      }
      .add-link-panel input, .edit-vote-panel textarea, .edit-vote-panel input[type="number"] {
        width: 100%; display: block; box-sizing: border-box;
        margin-bottom: 8px; font-size: 13px;
        padding: 10px 12px; background: rgba(0,0,0,0.4);
        border: 1px solid var(--border); border-radius: 8px;
        color: white; font-family: inherit;
      }
      .edit-vote-panel .input-label {
        display: block; font-size: 10px; font-weight: 700;
        text-transform: uppercase; color: var(--faint); margin-bottom: 6px;
      }
      .panel-actions {
        display: flex; gap: 8px; margin-top: 8px;
      }
      .panel-actions .btn {
        flex: 1; font-size: 12px; padding: 8px; font-weight: 700;
      }
    </style>
    <script type="module" src="./js/theme.js?v=platform-v7"></script>
    <script type="module" src="./js/utils.js?v=platform-v16"></script>
  </head>
  <body class="pending-page">
    <nav class="nav"></nav>
    <main class="page">
      <div class="pending-header">
        <div class="pending-header-text">
          <h1>Histórico de Votos</h1>
          <p>Animes que você já avaliou.</p>
        </div>
        <a href="pending.html" class="pending-history-btn">← Avaliações pendentes</a>
      </div>
      <div id="historico-container">
        <p style="color: var(--faint); text-align: center; padding: 40px">Carregando histórico...</p>
      </div>
    </main>
    <script type="module" src="./js/historico.js?v=platform-v17"></script>
    <script type="module" src="js/nyx-widget.js?v=platform-v17"></script>
  </body>
</html>
