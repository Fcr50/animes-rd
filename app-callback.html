<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abrindo AniLiber...</title>
    <style>
      :root {
        color-scheme: dark;
        background: #070910;
        color: #f8fafc;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        place-items: center;
      }

      main {
        display: grid;
        gap: 16px;
        max-width: 360px;
        text-align: center;
      }

      img {
        height: 72px;
        justify-self: center;
        width: 72px;
      }

      a {
        background: #20e7d0;
        border-radius: 999px;
        color: #041111;
        font-weight: 900;
        padding: 14px 18px;
        text-decoration: none;
      }

      p {
        color: rgba(248, 250, 252, 0.72);
        line-height: 1.45;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/aniliber-icon-192.png" alt="" />
      <h1>Abrindo AniLiber</h1>
      <p>Se o app nao abrir automaticamente, toque no botao abaixo.</p>
      <a id="open-app" href="aniliber://login-callback/">Abrir app</a>
    </main>

    <script>
      const deepLink = `aniliber://login-callback/${window.location.search}${window.location.hash}`;
      const openApp = document.getElementById("open-app");
      openApp.href = deepLink;
      setTimeout(() => {
        window.location.href = deepLink;
      }, 250);
    </script>
  </body>
</html>
