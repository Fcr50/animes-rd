<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciel · Grande Sábia | AniLiber</title>
    <link rel="stylesheet" href="css/style.css?v=artslum-1" />
    <script type="module" src="./js/theme.js?v=cleanup-1"></script>
    <script type="module" src="./js/utils.js?v=cleanup-1"></script>
  </head>
  <body class="ciel-page">
    <nav class="nav"></nav>

    <main class="ciel-shell">
      <aside class="ciel-sidebar">
        <div class="ciel-avatar-wrap">
          <div class="ciel-avatar-ring">
            <img src="assets/ciel-icon.png?v=desafios-soft-1" alt="Ciel" class="ciel-avatar-img" />
          </div>
        </div>

        <div class="ciel-id-block">
          <h2>Ciel</h2>
          <p>Grande Sábia</p>
          <span class="ciel-online-badge"><span class="ciel-dot"></span>Online</span>
        </div>

        <div class="ciel-info-list">
          <div class="ciel-info-item">
            <small>Habilidade</small>
            <span>Análise - Síntese - Recomendação</span>
          </div>
          <div class="ciel-info-item">
            <small>Animes no acervo</small>
            <span id="ciel-count">—</span>
          </div>
          <div class="ciel-info-item">
            <small>Assistidos por</small>
            <span id="ciel-person-count">—</span>
          </div>
        </div>

        <div class="ciel-profile-section">
          <small class="ciel-profile-label">Analisando perfil</small>
          <div class="ciel-people" id="ciel-people"></div>
        </div>
      </aside>

      <section class="ciel-chat-wrap">
        <div class="ciel-chat-topbar">
          <span>Ciel - Grande Sábia</span>
          <span class="ciel-topbar-status"><span class="ciel-dot"></span>ativo</span>
        </div>

        <div class="ciel-messages" id="ciel-messages"></div>

        <div class="ciel-quick-actions">
          <button class="ciel-quick-btn" data-quick="recommend">Recomendar</button>
          <button class="ciel-quick-btn" data-quick="top">Top do acervo</button>
          <button class="ciel-quick-btn" data-quick="stats">Estatísticas</button>
          <button class="ciel-quick-btn" data-quick="controversy">Controvérsias</button>
          <button class="ciel-quick-btn" data-quick="backlog">Backlog</button>
          <button class="ciel-quick-btn" data-quick="exclusive">Exclusivos</button>
          <button class="ciel-quick-btn" data-quick="pattern">Padrão de notas</button>
          <button class="ciel-quick-btn" data-quick="group">Dados do grupo</button>
        </div>

        <div class="ciel-input-bar">
          <input
            type="text"
            id="ciel-input"
            placeholder="Pergunte algo para Ciel..."
            autocomplete="off"
            maxlength="200"
          />
          <button id="ciel-send" type="button" aria-label="Enviar">Enviar</button>
        </div>
      </section>
    </main>

    <script type="module" src="js/nyx.js?v=desafios-soft-1"></script>
    <script type="module" src="js/nyx-widget.js?v=desafios-soft-1"></script>
  </body>
</html>
