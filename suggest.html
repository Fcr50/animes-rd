<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugerir Anime | Animes RD</title>
    <link rel="stylesheet" href="css/style.css?v=platform-v8" />
    <style>
      /* ── Título da página ── */
      body.suggest-page .page-header h1 {
        background: linear-gradient(90deg, #f9a8d4 0%, #c4b5fd 50%, #86efac 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: clamp(32px, 5vw, 56px);
      }

      /* ── Card principal com bordas temáticas ── */
      .suggest-form-card {
        max-width: 1150px;
        margin: 0 auto;
        padding: 25px 35px !important;
        border-radius: 28px !important;
        border: 2px solid transparent !important;
        background: 
          linear-gradient(var(--card), var(--card)) padding-box,
          linear-gradient(90deg, rgba(249, 168, 212, 0.4), rgba(196, 181, 253, 0.4), rgba(134, 239, 172, 0.4)) border-box !important;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      }

      /* Grid layout para campos */
      .form-grid-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 15px;
      }
      @media (max-width: 768px) {
        .form-grid-row { grid-template-columns: 1fr; }
      }

      /* ── Tabs com o importar à direita ── */
      .suggest-tabs {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding-bottom: 12px;
      }
      .tab-btn {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        color: var(--faint);
        font-weight: 700;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 10px;
        transition: all 0.2s;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tab-btn:hover {
        background: rgba(255,255,255,0.06);
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.3);
      }

      /* ── Fontes e Escrita ── */
      .suggest-form-card h2, .suggest-form-card .card-title {
        font-family: "Newsreader", serif;
        font-weight: 700;
        font-size: 22px;
        color: var(--paper);
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(196, 181, 253, 0.8);
        margin-bottom: 8px;
        font-family: inherit;
      }

      /* ── Inputs com contorno aparente suave ── */
      .suggest-form-card input[type="text"],
      .suggest-form-card input[type="number"],
      .suggest-form-card textarea,
      #anime-name, #anime-genres, #my-score, #my-comment {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1.5px solid rgba(196, 181, 253, 0.15) !important;
        padding: 12px 14px !important;
        font-size: 14px !important;
        border-radius: 10px !important;
        color: white !important;
      }

      /* ── Botão principal centralizado e mais proporcional ── */
      #submit-anime-button {
        background: linear-gradient(90deg, #f9a8d4 0%, #c4b5fd 50%, #86efac 100%) !important;
        border: none !important;
        border-radius: 12px !important;
        color: #1a1826 !important;
        font-weight: 800 !important;
        font-size: 16px !important;
        letter-spacing: 0.01em !important;
        padding: 14px !important;
        cursor: pointer;
        width: 100%;
        text-align: center;
        display: block;
        margin-top: 20px;
        box-shadow: 0 6px 20px rgba(196, 181, 253, 0.15);
        transition: all 0.2s ease !important;
      }
      #submit-anime-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }

      /* ── Checkbox customizada verde (FIXED) ── */
      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 15px 0;
        cursor: pointer;
        color: white;
        font-weight: 600;
        font-size: 14px;
        user-select: none;
      }
      .checkbox-group input {
        display: none; /* Esconde o nativo totalmente */
      }
      .custom-checkbox {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(134, 239, 172, 0.4);
        border-radius: 6px;
        background: rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .checkbox-group input:checked + .custom-checkbox {
        background: #86efac;
        border-color: #86efac;
      }
      .custom-checkbox::after {
        content: '✓';
        color: #1a1826;
        font-size: 14px;
        font-weight: 900;
        display: none;
      }
      .checkbox-group input:checked + .custom-checkbox::after {
        display: block;
      }

      /* ── Seção de Links ── */
      .links-suggestion-area {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px dashed rgba(255,255,255,0.1);
      }
      .link-input-row {
        display: grid;
        grid-template-columns: 1fr 1.5fr 40px;
        gap: 10px;
        margin-bottom: 8px;
      }
      .btn-remove-link {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .suggest-panel { display: none; }
      .suggest-panel.active { display: block; }

      /* ── Painel de Importação Otimizado ── */
      .import-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        gap: 10px;
        flex-wrap: wrap;
      }
      .import-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 14px;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 8px;
        margin-bottom: 20px;
      }
      .import-item {
        display: flex;
        flex-direction: column;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .import-item:hover {
        background: rgba(255,255,255,0.06);
        border-color: rgba(196,181,253,0.3);
      }
      .import-item.exists {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .import-item img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .import-item-info {
        padding: 10px;
        flex: 1;
      }
      .import-item-info strong {
        display: block;
        font-size: 12px;
        color: white;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .import-item-info p {
        font-size: 10px;
        color: var(--faint);
        margin: 0;
      }
      .import-item input {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 20px;
        height: 20px;
        z-index: 2;
        cursor: pointer;
      }

      /* Dropdown de busca */
      .search-container { position: relative; width: 100%; }
      .search-dropdown {
        position: absolute; top: 100%; left: 0; right: 0;
        background: #1c1c24; border: 1px solid var(--border);
        border-radius: 8px; z-index: 100; max-height: 250px;
        overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-top: 5px;
      }
      .search-result-item {
        display: flex; align-items: center; gap: 10px; padding: 8px;
        cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .search-result-item:hover { background: rgba(var(--accent-rgb), 0.2); }
      .search-result-item img { width: 35px; height: 50px; object-fit: cover; border-radius: 4px; }
      
      .hidden { display: none !important; }
    </style>
    <script type="module" src="./js/theme.js?v=platform-v8"></script>
    <script type="module" src="./js/utils.js?v=platform-v8"></script>
  </head>
  <body class="suggest-page">
    <nav class="nav"></nav>

    <main class="page">
      <div class="page-header">
        <h1>✨ Sugira um Novo Anime</h1>
        <p>Adicione novos títulos ao acervo do grupo.</p>
      </div>

      <div class="card suggest-form-card">
        <div class="suggest-tabs">
          <button class="tab-btn active" data-tab="new">🔍 Sugerir Novo</button>
          <button class="tab-btn" data-tab="import">📚 Importar do meu Histórico</button>
        </div>

        <!-- Aba: Novo Anime -->
        <div id="panel-new" class="suggest-panel active">
          <div class="form-grid-row">
            <div class="form-group">
              <label for="anime-name">Nome do Anime</label>
              <div class="search-container">
                <input type="text" id="anime-name" placeholder="Digite o nome para buscar no MAL..." autocomplete="off">
                <ul id="search-results-list" class="search-dropdown hidden"></ul>
              </div>
            </div>

            <div class="form-group">
              <label for="anime-genres">Gêneros (Automático)</label>
              <input type="text" id="anime-genres" placeholder="Ação, Aventura..." readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>
          </div>

          <div id="anime-details-section" class="hidden" style="margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; border-left: 4px solid var(--accent); margin-bottom: 15px;">
             <!-- Preenchido via JS -->
          </div>

          <div id="manual-fields" class="hidden">
            <label class="checkbox-group" style="margin: 10px 0;">
              <input type="checkbox" id="not-watched-check">
              <span class="custom-checkbox"></span>
              <span>Eu ainda <strong>não assisti</strong> este anime</span>
            </label>

            <div id="rating-fields" class="form-grid-row" style="margin-top: 15px;">
              <div class="form-group">
                <label for="my-score">Minha Nota</label>
                <input type="number" id="my-score" value="5.0" min="0" max="10" step="0.1">
              </div>
              <div class="form-group">
                <label for="my-comment">Meu Comentário (Opcional)</label>
                <input type="text" id="my-comment" placeholder="O que você achou deste anime?">
              </div>
            </div>

            <!-- SEÇÃO: LINKS -->
            <div class="links-suggestion-area" style="margin-top: 15px; padding-top: 15px;">
              <label style="font-size: 9px; font-weight: 800; color: rgba(196, 181, 253, 0.8); text-transform: uppercase; margin-bottom: 8px; display: block;">Links Adicionais (Opcional)</label>
              <div id="links-container-rows">
                <div class="link-input-row">
                  <input type="text" placeholder="Nome (ex: Opening 1)" class="link-name-input">
                  <input type="url" placeholder="https://..." class="link-url-input">
                  <button type="button" class="btn-remove-link" onclick="this.parentElement.remove()">×</button>
                </div>
              </div>
              <button type="button" class="btn" style="padding: 4px 10px; font-size: 10px; margin-top: 5px; background: rgba(255,255,255,0.05);" onclick="window.addNewLinkRow()">+ Adicionar outro link</button>
            </div>

            <button id="submit-anime-button">Enviar Sugestão</button>
          </div>
        </div>

        <!-- Aba: Importar Histórico -->
        <div id="panel-import" class="suggest-panel">
          <div class="import-controls">
            <button class="btn" style="padding: 8px 16px; font-size: 12px; background: rgba(255,255,255,0.05);" onclick="window.selectAllImport()">Selecionar Todos</button>
            <select id="filter-genre-import" style="padding: 8px 16px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 12px; outline: none;"></select>
          </div>
          
          <div id="import-list-container" class="import-list">
            <p>Carregando seu histórico...</p>
          </div>
          
          <button id="import-selected-button">Importar Selecionados (0)</button>
        </div>
      </div>
    </main>

    <script type="module" src="./js/suggest.js?v=platform-v8"></script>
    <script type="module" src="js/nyx-widget.js?v=platform-v8"></script>
  </body>
</html>
