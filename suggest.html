<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugerir Anime | Animes RD</title>
    <link rel="stylesheet" href="css/style.css?v=platform-v8" />
    <style>
      /* ── Título da página ── */
      body.suggest-page .page-header h1 {
        background: linear-gradient(90deg, #f9a8d4 0%, #c4b5fd 50%, #86efac 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: clamp(32px, 5vw, 56px);
      }

      /* ── Card principal ── */
      .suggest-form-card {
        max-width: 680px;
        margin: 0 auto;
        padding: 32px !important;
      }

      /* ── Labels dos campos ── */
      .form-group label,
      .suggest-form-card label {
        display: block;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--faint);
        margin-bottom: 8px;
      }

      /* ── Inputs e textareas ── */
      .suggest-form-card input[type="text"],
      .suggest-form-card input[type="number"],
      .suggest-form-card textarea,
      #anime-name, #anime-genres, #my-score, #my-comment {
        width: 100%;
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.25);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.18s ease;
        outline: none;
      }
      .suggest-form-card input[type="text"]:focus,
      .suggest-form-card input[type="number"]:focus,
      #anime-name:focus, #my-score:focus, #my-comment:focus {
        border-color: rgba(196, 181, 253, 0.5);
      }

      /* ── Botão principal ── */
      #submit-anime-button,
      #import-selected-button {
        background: linear-gradient(90deg, #f9a8d4 0%, #c4b5fd 50%, #86efac 100%) !important;
        border: none !important;
        border-radius: 12px !important;
        color: #1a1826 !important;
        font-weight: 900 !important;
        font-size: 15px !important;
        letter-spacing: 0.02em;
        padding: 14px !important;
        cursor: pointer;
        transition: opacity 0.2s ease, transform 0.15s ease !important;
        box-shadow: 0 4px 20px rgba(196, 181, 253, 0.25);
      }
      #submit-anime-button:hover:not(:disabled),
      #import-selected-button:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      #submit-anime-button:disabled,
      #import-selected-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Seção de detalhes do anime selecionado ── */
      #anime-details-section {
        border-left-color: rgba(196, 181, 253, 0.6) !important;
        background: rgba(196, 181, 253, 0.06) !important;
        border-radius: 12px !important;
      }

      /* ── Separador entre tabs e conteúdo ── */
      .suggest-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 15px;
      }
      .tab-btn {
        background: none;
        border: none;
        color: var(--faint);
        font-weight: 700;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--accent);
        color: white;
      }
      .suggest-panel {
        display: none;
      }
      .suggest-panel.active {
        display: block;
      }
      .import-list {
        display: grid;
        gap: 12px;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 10px;
      }
      .import-item {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
      }
      .import-item.exists {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .import-item input {
        width: 20px;
        height: 20px;
      }
      .import-item img {
        width: 45px;
        height: 60px;
        object-fit: cover;
        border-radius: 6px;
      }
      .import-item-info {
        flex: 1;
      }

      /* Estilos para a busca (o "modal" flutuante) */
      .search-container {
        position: relative;
        width: 100%;
      }
      .search-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #1c1c24;
        border: 1px solid var(--border);
        border-radius: 8px;
        z-index: 100;
        max-height: 300px;
        overflow-y: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        margin-top: 5px;
      }
      .search-result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        cursor: pointer;
        transition: background 0.2s;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .search-result-item:hover {
        background: rgba(var(--accent-rgb), 0.2);
      }
      .search-result-item img {
        width: 40px;
        height: 55px;
        object-fit: cover;
        border-radius: 4px;
      }
      .search-result-item div strong {
        display: block;
        font-size: 14px;
        color: white;
      }
      .search-result-item div small {
        color: var(--faint);
        font-size: 12px;
      }
      
      .hidden { display: none !important; }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 15px 0;
        cursor: pointer;
        user-select: none;
      }
      .checkbox-group input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
    </style>
    <script type="module" src="./js/theme.js?v=platform-v8"></script>
    <script type="module" src="./js/utils.js?v=platform-v8"></script>
  </head>
  <body class="suggest-page">
    <nav class="nav"></nav>

    <main class="page">
      <div class="page-header">
        <h1>✨ Sugira um Novo Anime</h1>
        <p>Adicione novos títulos ao acervo do grupo.</p>
      </div>

      <div class="card suggest-form-card">
        <div class="suggest-tabs">
          <button class="tab-btn active" data-tab="new">🔍 Sugerir Novo</button>
          <button class="tab-btn" data-tab="import">📚 Importar do meu Histórico</button>
        </div>

        <!-- Aba: Novo Anime -->
        <div id="panel-new" class="suggest-panel active">
          <div class="form-group">
            <label for="anime-name">Nome do Anime</label>
            <div class="search-container">
              <input type="text" id="anime-name" placeholder="Digite o nome para buscar no MAL..." autocomplete="off">
              <ul id="search-results-list" class="search-dropdown hidden"></ul>
            </div>
          </div>

          <!-- Campos automáticos escondidos até selecionar -->
          <div id="anime-details-section" class="hidden" style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border-left: 4px solid var(--accent);">
             <!-- Preenchido via JS -->
          </div>

          <div id="manual-fields" class="hidden">
            <div class="form-group" style="margin-top: 20px;">
              <label for="anime-genres">Gêneros (Automático)</label>
              <input type="text" id="anime-genres" placeholder="Ação, Aventura..." readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>

            <label class="checkbox-group">
              <input type="checkbox" id="not-watched-check">
              <span>Eu ainda <strong>não assisti</strong> este anime</span>
            </label>

            <div id="rating-fields" style="margin-top: 20px; display: grid; grid-template-columns: 100px 1fr; gap: 20px;">
              <div class="form-group">
                <label for="my-score">Minha Nota</label>
                <input type="number" id="my-score" value="5.0" min="0" max="10" step="0.1" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px; color: white;">
              </div>
              <div class="form-group">
                <label for="my-comment">Meu Comentário (Opcional)</label>
                <input type="text" id="my-comment" placeholder="O que você achou deste anime?">
              </div>
            </div>

            <button id="submit-anime-button" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Enviar Sugestão</button>
          </div>
        </div>

        <!-- Aba: Importar Histórico -->
        <div id="panel-import" class="suggest-panel">
          <p style="color: var(--faint); margin-bottom: 20px; font-size: 14px;">Selecione os animes que você já assistiu em outros grupos para sugerir aqui.</p>
          <div id="import-list-container" class="import-list">
            <p>Carregando seu histórico...</p>
          </div>
          <button id="import-selected-button" class="btn btn-primary" style="width: 100%; margin-top: 20px;" disabled>Importar Selecionados (0)</button>
        </div>
      </div>
    </main>

    <script type="module" src="./js/suggest.js?v=platform-v8"></script>
    <script type="module" src="js/nyx-widget.js?v=platform-v8"></script>
  </body>
</html>
