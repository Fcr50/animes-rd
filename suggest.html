<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugerir Anime | Animes RD</title>
    <link rel="stylesheet" href="css/style.css?v=artslum-1" />
    <style>
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        color: var(--text);
        display: block;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      .form-group input[type="text"] {
        width: 100%;
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: white;
      }

      /* Light mode: labels, inputs e textos em preto */
      body:not(.dark-theme) .form-group label {
        color: #1b1718 !important;
      }

      body:not(.dark-theme) .form-group input[type="text"],
      body:not(.dark-theme) #submission-form-container input,
      body:not(.dark-theme) #submission-form-container textarea,
      body:not(.dark-theme) #submission-form-container select {
        background: #ffffff !important;
        border: 1.5px solid rgba(16, 16, 16, 0.18) !important;
        color: #1b1718 !important;
      }

      body:not(.dark-theme) .form-group input[type="text"]::placeholder,
      body:not(.dark-theme) #submission-form-container input::placeholder {
        color: #a09490 !important;
      }

      body:not(.dark-theme) #submission-form-container p,
      body:not(.dark-theme) #submission-form-container small {
        color: #1b1718 !important;
      }

      body:not(.dark-theme) #submission-form-container a {
        color: #5d8bff !important;
      }

      /* Título da página mais escuro no light mode */
      body.suggest-page:not(.dark-theme) .page-header h1 {
        background: linear-gradient(90deg, #ff6a4a 0%, #5d8bff 50%, #57cdae 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
      }
    </style>
    <script type="module" src="./js/theme.js?v=desafios-soft-1"></script>
    <script type="module" src="./js/utils.js?v=desafios-soft-1"></script>
  </head>
  <body class="suggest-page">
    <nav class="nav"></nav>

    <main class="page">
      <div class="page-header">
        <h1>✨ Sugira um Novo Anime</h1>
      </div>

      <div class="card suggest-form-card">
        <div id="submission-form-container">
          <p style="color: var(--faint)">Carregando formulário...</p>
        </div>
      </div>
    </main>

    <script type="module" src="./js/suggest.js?v=desafios-soft-1"></script>
    <script type="module" src="js/nyx-widget.js?v=desafios-soft-1"></script>
  </body>
</html>
