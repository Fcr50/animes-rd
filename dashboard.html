<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Animes RD</title>
  <link rel="stylesheet" href="css/style.css?v=cleanup-1" />
  <script type="module" src="./js/theme.js?v=platform-v3"></script>
  <script type="module" src="./js/utils.js?v=platform-v3"></script>
  <style>.nyx-floating-link { display: none !important; }</style>
  <script>
    const _obs = new MutationObserver(() => {
      document.querySelectorAll('.nyx-floating-link').forEach(el => el.remove());
    });
    _obs.observe(document.documentElement, { childList: true, subtree: true });
  </script>
</head>
<body class="dashboard-page">
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <h1>Seus Grupos</h1>
      <p>Gerencie seus catálogos de animes compartilhados.</p>
    </div>

    <div id="auth-check" style="display: none;">
      <div class="card" style="text-align: center; padding: 40px;">
        <p>Você precisa estar logado para acessar seu dashboard.</p>
        <button id="btn-login-dashboard" class="btn btn-primary" style="margin-top: 20px;">Fazer Login com Google</button>
      </div>
    </div>

    <div id="dashboard-content" style="display: none;">
      <div class="grid-2">
        <div class="card">
          <div style="font-family:'Newsreader',serif; font-size:22px; font-weight:750; letter-spacing:-0.01em; text-align:center; margin-bottom:18px; background:linear-gradient(90deg,#5d8bff,#57cdae); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Criar Novo Grupo</div>
          <form id="create-group-form" style="margin-top: 0;">
            <div class="form-group">
              <label for="group-name">Nome do Grupo</label>
              <input type="text" id="group-name" placeholder="Ex: Galera da Faculdade" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Criar Grupo</button>
          </form>
        </div>

        <div class="card">
          <div style="font-family:'Newsreader',serif; font-size:22px; font-weight:750; letter-spacing:-0.01em; text-align:center; margin-bottom:18px; background:linear-gradient(90deg,#ff9fc7,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Entrar em um Grupo</div>
          <form id="join-group-form" style="margin-top: 0;">
            <div class="form-group">
              <label for="invite-code">Código de Convite</label>
              <input type="text" id="invite-code" placeholder="Ex: ABC-123" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Entrar</button>
          </form>
        </div>
      </div>

      <div class="section-head" style="margin-top: 40px;">
        <h2>Grupos que você participa</h2>
      </div>

      <div id="groups-list" class="grid-3" style="margin-top: 20px;">
        <!-- Grupos serão carregados aqui -->
        <p class="skeleton" style="height: 100px;"></p>
        <p class="skeleton" style="height: 100px;"></p>
        <p class="skeleton" style="height: 100px;"></p>
      </div>
    </div>
  </main>

  <script type="module" src="./js/dashboard.js?v=platform-v3"></script>
</body>
</html>
