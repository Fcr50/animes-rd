name: Supabase Scheduled Backup

on:
  schedule:
    # Roda todo dia às 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Database Dump
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          # Usamos a porta 5432 (Session) com o host do Pooler para garantir IPv4
          # O formato da URI é o mais robusto contra erros de parsing
          pg_dump "postgresql://postgres.$PROJECT_ID:$DB_PASSWORD@aws-1-sa-east-1.pooler.supabase.com:6543/postgres" -f backup_data.sql
          
      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ github.run_id }}
          path: backup_data.sql
          retention-days: 7 # Guarda cada backup por 7 dias no GitHub
