name: Supabase Scheduled Backup

on:
  schedule:
    # Roda todo dia às 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Database Dump
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          # Usa o pg_dump nativo que já existe no GitHub Actions
          # O endereço aws-0-sa-east-1 é IPv4 e funciona no GitHub
          # O usuário PRECISA ser no formato postgres.ID_DO_PROJETO
          PGPASSWORD="$DB_PASSWORD" pg_dump -h aws-0-sa-east-1.pooler.supabase.com -p 6543 -U "postgres.xiziyothphnyifyftrwz" -f backup_data.sql postgres

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ github.run_id }}
          path: backup_data.sql
          retention-days: 7 # Guarda cada backup por 7 dias no GitHub
