name: Supabase Scheduled Backup

on:
  schedule:
    # Roda todo dia às 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client 17
        run: |
          # Adiciona o repositório oficial do PostgreSQL para baixar a versão 17
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/postgresql.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
- name: Run Database Dump
  env:
    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    PROJECT_ID: ${{ secrets.PROJECT_ID }}
  run: |
    # Região confirmada: sa-east-1
    REGION="sa-east-1"

    # Limpa o ID (remove 'postgres.' se houver e espaços)
    CLEAN_ID=$(echo "${PROJECT_ID#postgres.}" | tr -d '[:space:]')

    echo "Iniciando dump usando pg_dump 17 para o projeto: $CLEAN_ID"

    # Forçamos o uso do executável da versão 17 instalado no passo anterior
    # O caminho padrão no Ubuntu é /usr/lib/postgresql/17/bin/pg_dump
    /usr/lib/postgresql/17/bin/pg_dump "postgresql://postgres.$CLEAN_ID:$DB_PASSWORD@aws-1-$REGION.pooler.supabase.com:6543/postgres" -f backup_data.sql

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ github.run_id }}
          path: backup_data.sql
          retention-days: 7 # Guarda cada backup por 7 dias no GitHub
