name: Supabase Scheduled Backup

on:
  schedule:
    # Roda todo dia às 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Database Dump
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          # Região: sa-east-1
          REGION="sa-east-1"
          # Limpa eventuais espaços no ID do projeto
          CLEAN_PROJECT_ID=$(echo "${{ secrets.PROJECT_ID }}" | tr -d '[:space:]')
          
          # Usamos flags explícitas (-h, -p, -U) que são mais seguras que uma URL longa
          # Porta 6543 é o padrão para conexões estáveis via Pooler
          PGPASSWORD="$DB_PASSWORD" pg_dump -h "aws-0-$REGION.pooler.supabase.com" -p 6543 -U "postgres.$CLEAN_PROJECT_ID" -d postgres -f backup_data.sql

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ github.run_id }}
          path: backup_data.sql
          retention-days: 7 # Guarda cada backup por 7 dias no GitHub
