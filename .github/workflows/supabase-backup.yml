name: Supabase Scheduled Backup

on:
  schedule:
    # Roda todo dia às 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Database Dump
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          # Região confirmada: sa-east-1 (São Paulo)
          REGION="sa-east-1"
          PGPASSWORD="$DB_PASSWORD" pg_dump "postgres://postgres.$PROJECT_ID:$DB_PASSWORD@aws-0-$REGION.pooler.supabase.com:5432/postgres" -f backup_data.sql

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ github.run_id }}
          path: backup_data.sql
          retention-days: 7 # Guarda cada backup por 7 dias no GitHub
